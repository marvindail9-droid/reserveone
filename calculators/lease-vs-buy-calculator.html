</style></head><body><div class="header"><a href="/"><img src="/assets/img/reserveone-logo.svg" alt="ReserveOne"></a></div><main><h1>Lease vs Buy Calculator</h1><p class="lead">Compare a simplified luxury vehicle lease cost against buying and financing.</p><section class="tool"><div class="panel"><label for="lease">Monthly lease payment</label><input id="lease" type="number" value="1800" step="any"><small>USD</small><label for="loan">Monthly loan payment</label><input id="loan" type="number" value="2800" step="any"><small>USD</small><label for="months">Months</label><input id="months" type="number" value="36" step="any"><small>months</small><label for="resale">Estimated resale equity after term</label><input id="resale" type="number" value="30000" step="any"><small>USD</small><button onclick="runCalc()">Calculate</button></div><div class="panel"><h2>Result</h2><div class="result" id="result">$0</div><p id="summary"></p></div></section><section class="panel"><h2>Lease vs buy note</h2><p>Real decisions also depend on mileage, taxes, maintenance, warranty, depreciation, and flexibility.</p></section></main><script>function money(n){return isFinite(n)?n.toLocaleString(undefined,{style:'currency',currency:'USD',maximumFractionDigits:0}):'$0';}function num(id){return parseFloat(document.getElementById(id).value)||0;}function runCalc(){let lease=num('lease')*num('months');let buy=num('loan')*num('months')-num('resale');document.getElementById('result').textContent=money(lease-buy);document.getElementById('summary').textContent='Positive means leasing costs more in this simplified estimate; negative means buying costs more.';}runCalc();</script></body></html>
