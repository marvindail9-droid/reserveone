</style><script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Savings Goal Calculator","description":"Estimate how much to save monthly for a target goal."}</script></head><body><div class="top"><a href="/"><img src="/assets/img/reserveone-logo.svg" alt="ReserveOne"></a></div><main><h1>Savings Goal Calculator</h1><p class='lead'>Estimate how much to save monthly for a target goal.</p><div class='grid'><div class='card'><label for='goal'>Savings goal</label><input id='goal' type='number' value='100000' step='any' style='width:100%;padding:12px;margin:6px 0 12px;background:#090909;color:#fff;border:1px solid #3d3320;border-radius:6px'><label for='current'>Current savings</label><input id='current' type='number' value='10000' step='any' style='width:100%;padding:12px;margin:6px 0 12px;background:#090909;color:#fff;border:1px solid #3d3320;border-radius:6px'><label for='years'>Years</label><input id='years' type='number' value='5' step='any' style='width:100%;padding:12px;margin:6px 0 12px;background:#090909;color:#fff;border:1px solid #3d3320;border-radius:6px'><button onclick='runCalc()' style='background:#e7b94f;color:#050505;border:0;border-radius:6px;padding:13px 20px;font-weight:900'>Calculate</button></div><div class='card'><h2>Result</h2><div id='result' style='font-size:30px;color:#e7b94f;font-weight:900'>$0</div><p id='summary'>Estimate only.</p></div></div><script>function money(n){return isFinite(n)?n.toLocaleString(undefined,{style:'currency',currency:'USD',maximumFractionDigits:0}):'$0';}function num(id){return parseFloat(document.getElementById(id).value)||0;}function runCalc(){let m=(num('goal')-num('current'))/(num('years')*12);document.getElementById('result').textContent=money(m);document.getElementById('summary').textContent='Estimated monthly savings needed.';}runCalc();</script></main></body></html>
