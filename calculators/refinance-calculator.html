</style></head><body><div class="header"><a href="/"><img src="/assets/img/reserveone-logo.svg" alt="ReserveOne"></a></div><main><h1>Refinance Calculator</h1><p class="lead">Compare current and new loan payments to estimate refinance savings.</p><section class="tool"><div class="panel"><label for="balance">Loan balance</label><input id="balance" type="number" value="500000" step="any"><small>USD</small><label for="oldrate">Current rate</label><input id="oldrate" type="number" value="7.5" step="any"><small>%</small><label for="newrate">New rate</label><input id="newrate" type="number" value="6.5" step="any"><small>%</small><label for="years">New term</label><input id="years" type="number" value="30" step="any"><small>years</small><button onclick="runCalc()">Calculate</button></div><div class="panel"><h2>Result</h2><div class="result" id="result">$0</div><p id="summary"></p></div></section><section class="panel"><h2>Refinance note</h2><p>Consider closing costs, breakeven period, and total interest before refinancing.</p></section></main><script>function money(n){return isFinite(n)?n.toLocaleString(undefined,{style:'currency',currency:'USD',maximumFractionDigits:0}):'$0';}function num(id){return parseFloat(document.getElementById(id).value)||0;}function runCalc(){let P=num('balance'),n=num('years')*12;let oldr=(num('oldrate')/100)/12,newr=(num('newrate')/100)/12;let oldp=P*oldr*Math.pow(1+oldr,n)/(Math.pow(1+oldr,n)-1);let newp=P*newr*Math.pow(1+newr,n)/(Math.pow(1+newr,n)-1);document.getElementById('result').textContent=money(oldp-newp);document.getElementById('summary').textContent='Estimated monthly payment reduction before closing costs.';}runCalc();</script></body></html>
