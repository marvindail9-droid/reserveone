</style></head><body><div class="header"><a href="/"><img src="/assets/img/reserveone-logo.svg" alt="ReserveOne"></a></div><main><h1>Retirement Calculator</h1><p class="lead">Estimate future retirement savings from current assets and monthly contributions.</p><section class="tool"><div class="panel"><label for="start">Current savings</label><input id="start" type="number" value="100000" step="any"><small>USD</small><label for="monthly">Monthly contribution</label><input id="monthly" type="number" value="1000" step="any"><small>USD</small><label for="rate">Annual return</label><input id="rate" type="number" value="6" step="any"><small>%</small><label for="years">Years to grow</label><input id="years" type="number" value="25" step="any"><small>years</small><button onclick="runCalc()">Calculate</button></div><div class="panel"><h2>Result</h2><div class="result" id="result">$0</div><p id="summary"></p></div></section><section class="panel"><h2>Planning note</h2><p>This is an educational estimate. Inflation, taxes, and market risk can change outcomes.</p></section></main><script>function money(n){return isFinite(n)?n.toLocaleString(undefined,{style:'currency',currency:'USD',maximumFractionDigits:0}):'$0';}function num(id){return parseFloat(document.getElementById(id).value)||0;}function runCalc(){let bal=num('start'),r=(num('rate')/100)/12,n=num('years')*12;for(let i=0;i<n;i++){bal=bal*(1+r)+num('monthly');}document.getElementById('result').textContent=money(bal);document.getElementById('summary').textContent='Estimated future retirement savings.';}runCalc();</script></body></html>
